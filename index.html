<!DOCTYPE html>
<html>
  <head>
    <title>Mon site</title>
  </head>
  <body style="background-color: blue; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; gap: 30px;">

    <p id="compteur" style="color: white; font-size: 30px; font-family: Arial;">
      0 clic
    </p>

    <div onclick="compter()" id="interrupteur" style="
      width: 100px;
      height: 100px;
      background-color: white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
      transition: transform 0.1s;
    "></div>

    <    <script>
      let nb = 0;
      function compter() {
        nb++;
        document.getElementById("compteur").textContent = nb + " clic" + (nb > 1 ? "s" : "");
        const b = document.getElementById("interrupteur");
        b.style.transform = "scale(0.9)";
        setTimeout(() => b.style.transform = "scale(1)", 100);
        if (nb === 100) {
          document.getElementById("slabel").textContent = "Laurianne la plus belle";
          document.getElementById("slabel").style.fontSize = "22px";
        }
      }
    </script>

    </script>
    <img src="IMG_7892.webp" style="
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 150px;
      border-radius: 10px;
    ">    <p id="slabel" style="
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: hotpink;
      font-size: 40px;
      font-family: Arial;
      margin: 0;
    ">S+L</p>


  </body>
</html>
